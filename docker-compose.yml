# =============================================================================
# Docker Compose - BotNexHealth Production Stack
# =============================================================================
# Usage:
#   docker compose up -d              # Start all services
#   docker compose logs -f api        # Follow API logs
#   docker compose ps                 # Check status
#   docker compose down               # Stop all services
# =============================================================================

services:
  # ===========================================================================
  # FastAPI Backend Application
  # ===========================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: botnexhealth-api
    restart: unless-stopped

    # Environment configuration
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info

    # Expose port internally only (nginx handles external)
    expose:
      - "8000"

    # Resource limits (adjust based on your server)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

    # Health check (uses /livez - no auth required)
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/livez', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m

    networks:
      - backend
      - frontend  # Needed to reach external APIs (NexHealth)

  # ===========================================================================
  # Nginx Reverse Proxy
  # ===========================================================================
  nginx:
    image: nginx:1.25-alpine
    container_name: botnexhealth-nginx
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

    depends_on:
      api:
        condition: service_healthy

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M

    # Health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

    # Security
    security_opt:
      - no-new-privileges:true

    networks:
      - backend
      - frontend

# =============================================================================
# Networks
# =============================================================================
networks:
  backend:
    driver: bridge
    internal: true  # No external access, only through nginx
  frontend:
    driver: bridge
