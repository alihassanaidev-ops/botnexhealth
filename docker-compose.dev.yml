services:
  postgres:
    image: postgres:16
    container_name: botnexhealth-postgres
    environment:
      POSTGRES_DB: nexhealth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - botnexhealth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexhealth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: botnexhealth-redis
    ports:
      - "6379:6379"
    volumes:
      - botnexhealth_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: production
    container_name: botnexhealth-api
    env_file:
      - path: .env
        required: false
    environment:
      APP_ENV: local
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-local-dev-encryption-secret}
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/nexhealth
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      AUTH_FRONTEND_BASE_URL: http://localhost:3000
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    command: uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./pyproject.toml:/app/pyproject.toml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:22-bookworm-slim
    container_name: botnexhealth-web
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ./nexus-dashboard-web:/app
      - botnexhealth_web_node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  botnexhealth_postgres_data:
  botnexhealth_redis_data:
  botnexhealth_web_node_modules:
