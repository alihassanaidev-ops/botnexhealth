# =============================================================================
# Docker Compose Override - Development Settings
# =============================================================================
# This file is automatically loaded with docker-compose.yml
# For production, rename or remove this file
# =============================================================================

services:
  api:
    build:
      target: production

    # Mount source code for hot reload in development
    volumes:
      - ./src:/app/src:ro

    # Override command for development with hot reload
    command: ["uvicorn", "src.app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

    environment:
      - APP_ENV=development
      - LOG_LEVEL=debug

    # Expose port directly for development
    ports:
      - "8000:8000"

    # Relax security for development
    read_only: false

    # Less strict resource limits for development
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  nginx:
    # In development, you might want to bypass nginx
    profiles:
      - with-nginx
