# =============================================================================
# Render.com Deployment Configuration (HIPAA Compliant)
# =============================================================================
# This file defines the infrastructure as code for Render deployment.
# Deploy by connecting your GitHub repo to Render or using render deploy.
# =============================================================================

services:
  # Main API service
  - type: web
    name: botnexhealth-api
    runtime: docker
    
    # Docker configuration
    dockerContext: .
    dockerfilePath: ./Dockerfile
    
    # Scaling
    plan: starter  # Upgrade to "standard" or "pro" for production
    numInstances: 1
    
    # Region (choose based on your users)
    region: oregon  # Options: oregon, ohio, virginia, frankfurt, singapore
    
    # Health check
    healthCheckPath: /livez
    
    # Auto-deploy on push
    autoDeployTrigger: commit
    
    # Environment variables (set in Render dashboard for secrets)
    envVars:
      # App configuration
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      
      # Database (using your external Supabase)
      - key: DATABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: CELERY_BROKER_URL
        sync: false  # Set to internal Key Value URL, e.g. redis://red-xxxx:6379
      
      # Secrets (set in Render dashboard - never in this file!)
      - key: NEXHEALTH_API_KEY
        sync: false
      - key: RETELL_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: RESEND_ALERT_RECIPIENTS
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_REDIRECT_URL
        sync: false


  # Key Value Store (Redis-compatible)
  - type: keyvalue
    name: botnexhealth-redis
    region: oregon
    plan: starter
    ipAllowList: [] # internal only

  # Background Worker
  - type: worker
    name: botnexhealth-worker
    runtime: docker
    dockerContext: .
    dockerfilePath: ./Dockerfile
    
    # Scaling
    plan: starter
    numInstances: 1
    region: oregon

    # Command
    dockerCommand: celery -A src.app.worker worker --loglevel=info
    
    # Environment Variables
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      
      # Connect to Key Value Store (Redis-compatible)
      - key: CELERY_BROKER_URL
        sync: false  # Set to internal Key Value URL, e.g. redis://red-xxxx:6379

      # Inherit Secrets (Must match API service)
      - key: DATABASE_URL
        sync: false
      - key: NEXHEALTH_API_KEY
        sync: false
      - key: RETELL_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: RESEND_ALERT_RECIPIENTS
        sync: false
      - key: ADMIN_API_KEY
        sync: false
      - key: ENCRYPTION_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false


# =============================================================================
# Notes for HIPAA Compliance on Render:
# =============================================================================
# 1. Enable "HIPAA mode" in Render dashboard (requires Business plan)
# 2. All secrets via Render Secret Environment Variables
# 3. Enable audit logging in Render dashboard
# 4. Use private networking if connecting to other Render services
# 5. Review Render's BAA (Business Associate Agreement) requirements
# =============================================================================
