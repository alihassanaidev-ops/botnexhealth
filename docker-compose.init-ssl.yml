# Temporary compose file for SSL certificate acquisition
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botnexhealth-api
    env_file:
      - .env
    environment:
      - APP_ENV=production
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/livez', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: botnexhealth-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.init.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - backend

networks:
  backend:
    driver: bridge
