# =============================================================================
# Initial Nginx Configuration - For SSL Certificate Acquisition
# Use this BEFORE you have SSL certificates
# =============================================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    access_log /var/log/nginx/access.log;
    server_tokens off;

    # Upstream (for health checks during cert acquisition)
    upstream fastapi_backend {
        server api:8000;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name api.nexusdental.ai;

        # Let's Encrypt ACME challenge - REQUIRED for cert acquisition
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        # Health check (so we know nginx is working)
        location /health {
            return 200 '{"status":"healthy","service":"nginx","ssl":"pending"}';
            add_header Content-Type application/json;
        }

        # Proxy to API (HTTP only during setup)
        location / {
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
