# =============================================================================
# Docker Compose - Production Configuration
# =============================================================================
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.ssl.yml up -d
# =============================================================================

services:
  # ===========================================================================
  # FastAPI Backend - Production Overrides
  # ===========================================================================
  api:
    # Mount secrets as bind mounts with correct permissions
    volumes:
      - ./secrets:/run/secrets:ro

    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
      - NEXHEALTH_API_KEY_FILE=/run/secrets/nexhealth_api_key.txt
      - RETELL_API_SECRET_FILE=/run/secrets/retell_api_secret.txt
      - ADMIN_API_KEY_FILE=/run/secrets/admin_api_key.txt
      - GHL_API_KEY_FILE=/run/secrets/ghl_api_key.txt
      - GHL_LOCATION_ID=nUR2OnxPQh3aLQXrymf6

    # Don't use .env in production
    env_file: []

    # Need to disable read_only to allow secrets mount
    read_only: false

  # ===========================================================================
  # Redis - Token Caching
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: botnexhealth-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 100mb
      --maxmemory-policy allkeys-lru

    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

    security_opt:
      - no-new-privileges:true

    networks:
      - backend
